<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Chỉnh Sửa Sinh Viên</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    table { border-collapse: collapse; margin-bottom: 20px; }
    td { padding: 5px 10px; border: 1px solid #000; }
    .label { font-weight: bold; background-color: #eee; width: 120px; }
    input { border: none; width: 100%; outline: none; font-size: 16px; }
    input[readonly] { background-color: #f9f9f9; color: #666; cursor: not-allowed; }
    .actions { margin-top: 15px; }
    button, a { cursor: pointer; padding: 5px 10px; border: 1px solid #000; background: #fff; display: inline-block; text-decoration: none; color: black; }
    button[type="submit"] { background-color: #e7f3ff; font-weight: bold; }
  </style>
</head>
<body>

<h1>Chỉnh sửa thông tin sinh viên</h1>

<form th:action="@{/students/update/{id}(id=${student.id})}" th:object="${student}" method="post">
  <table>
    <tr>
      <td class="label">ID</td>
      <td>
        <input type="text" th:field="*{id}" readonly />
      </td>
    </tr>
    <tr>
      <td class="label">Name</td>
      <td>
        <input type="text" th:field="*{name}" required />
      </td>
    </tr>
    <tr>
      <td class="label">Email</td>
      <td>
        <input type="text" th:field="*{email}" required />
      </td>
    </tr>
    <tr>
      <td class="label">Age</td>
      <td>
        <input type="number" th:field="*{age}" required />
      </td>
    </tr>
  </table>

  <div class="actions">
    <button type="submit">Save</button>

    <a th:href="@{/students}">Back</a>

    <a th:href="@{/students/delete/{id}(id=${student.id})}">Delete</a>
  </div>
</form>

</body>
</html>
